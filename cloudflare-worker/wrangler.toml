name = "shadow-clone-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[env.production]
name = "shadow-clone-api-prod"

# Add your KV namespaces for data storage
[[kv_namespaces]]
binding = "USERS"
id = "1685957a286a4212be202332e2dce051"
preview_id = "aa94cc79e9944fb8890ee1c2ec8dcfad"

[[kv_namespaces]]
binding = "PROJECTS"
id = "d63a899edc7943b7995035907374bc2d"
preview_id = "3142493c595b4b648ca7fbdf3602ad7c"

[[kv_namespaces]]
binding = "API_KEYS"
id = "da0cfb3f101843bdb2e58e127e2110c1"
preview_id = "dfece89e12874900b863c2b05099acdf"

# Environment variables
[vars]
ENVIRONMENT = "development"

# CORS configuration
[env.production.vars]
ENVIRONMENT = "production"
CORS_ORIGIN = "*"

# Cron triggers for scheduled reports
[triggers]
crons = [
  "0 9 * * *",     # Daily at 9 AM UTC
  "0 9 * * 1",     # Weekly on Monday at 9 AM UTC
  "0 9 1 * *"      # Monthly on 1st at 9 AM UTC
]